name: Update README Stats

on:
  push:
    branches: [main]
    paths:
      - 'llm/**'
      - '.github/workflows/update-stats.yml'
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README with Amplitude stats
        env:
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
          AMPLITUDE_QUERY_KEY: ${{ secrets.AMPLITUDE_QUERY_KEY }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, sys, time, re
          from datetime import datetime, timezone, timedelta
          from pathlib import Path
          from urllib.error import HTTPError
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          README    = Path("README.md")
          HEADER    = "## API Usage Statistics"
          TW_TZ     = timezone(timedelta(hours=8))
          AMP_START = (datetime.now(TW_TZ) - timedelta(days=365)).strftime("%Y%m%d")
          APP_COLORS = ["blue", "green", "orange", "red", "purple", "yellowgreen", "cyan", "teal", "pink", "indigo"]
          CHART_COLORS = ["#1A6CF7", "#00C2A0", "#F7931A", "#A456F0", "#FF5733", "#20B2AA", "#E91E63", "#9C27B0", "#673AB7", "#3F51B5"]

          SERVICE_MODELS = {
              "Gemini API (Direct)": ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-2.5-flash-lite"],
              "NAS Bridge (Codex/ChatGPT)": ["codex", "chatgpt-pro"],
              "Local Inference (MLX/Whisper)": [
                  "mlx-qwen3", "mlx-gemma4", "whisper-large-v3", 
                  "mlx-community/whisper-large-v3-turbo", "whisper-large-v3-turbo", "distil-whisper-large-v3"
              ]
          }
          SERVICE_SVG = {
              "Gemini API (Direct)": ["assets/chart_gemini_7d.svg", "assets/chart_gemini_models_7d.svg"],
              "NAS Bridge (Codex/ChatGPT)": ["assets/chart_nas_7d.svg"],
              "Local Inference (MLX/Whisper)": ["assets/chart_mlx_7d.svg"]
          }

          def amp_get(api_key, secret_key, params):
              url = "https://amplitude.com/api/2/events/segmentation?" + urlencode(params)
              creds = base64.b64encode(f"{api_key}:{secret_key}".encode()).decode()
              req = Request(url, headers={"Authorization": f"Basic {creds}"})
              for attempt in range(5):
                  try:
                      time.sleep(3)
                      with urlopen(req, timeout=30) as r: return json.loads(r.read())
                  except HTTPError as e:
                      if e.code == 429:
                          time.sleep((attempt + 1) * 20); continue
                      raise
              raise Exception("Amplitude API failed")

          def query_total_calls(api_key, secret_key, days=None, offset_days=0, model_filter=None):
              end_dt = datetime.now(TW_TZ) - timedelta(days=offset_days)
              start = (end_dt - timedelta(days=days-1)).strftime("%Y%m%d") if days else AMP_START
              event_def = {"event_type": "llm_call"}
              if model_filter: event_def["filters"] = [{"subprop_type": "event", "subprop_key": "model", "subprop_op": "is", "subprop_value": model_filter}]
              params = {"e": json.dumps(event_def), "start": start, "end": end_dt.strftime("%Y%m%d"), "m": "totals", "i": "1"}
              try:
                  data = amp_get(api_key, secret_key, params)
                  return sum(sum(s) for s in data.get("data", {}).get("series", [[]]) if s)
              except: return 0

          def query_daily_series(api_key, secret_key, days, model_filter=None):
              end_dt = datetime.now(TW_TZ); start_dt = end_dt - timedelta(days=days-1)
              event_def = {"event_type": "llm_call"}
              if model_filter: event_def["filters"] = [{"subprop_type": "event", "subprop_key": "model", "subprop_op": "is", "subprop_value": model_filter}]
              params = {"e": json.dumps(event_def), "start": start_dt.strftime("%Y%m%d"), "end": end_dt.strftime("%Y%m%d"), "m": "totals", "i": "1"}
              try:
                  data = amp_get(api_key, secret_key, params)
                  return data.get("data", {}).get("series", [[]])[0]
              except: return [0] * days

          def query_grouped(api_key, secret_key, group_prop, model_filter=None):
              event_def = {"event_type": "llm_call", "group_by": [{"type": "event", "value": group_prop}]}
              if model_filter: event_def["filters"] = [{"subprop_type": "event", "subprop_key": "model", "subprop_op": "is", "subprop_value": model_filter}]
              params = {"e": json.dumps(event_def), "start": AMP_START, "end": datetime.now(TW_TZ).strftime("%Y%m%d"), "m": "totals", "i": "1", "limit": "20"}
              data = amp_get(api_key, secret_key, params)
              series, labels, result = data.get("data", {}).get("series", []), data.get("data", {}).get("seriesLabels", []), {}
              for i, label in enumerate(labels):
                  if i < len(series):
                      if isinstance(label, list): label = [x for x in label if isinstance(x, str)][0] if any(isinstance(x, str) for x in label) else ""
                      total = sum(v for v in series[i] if v is not None)
                      if total > 0 and label: result[label] = int(total)
              return result

          def query_avg_duration_all(api_key, secret_key):
              params = {"e": json.dumps({"event_type": "llm_call", "group_by": [{"type": "event", "value": "model"}]}), "start": AMP_START, "end": datetime.now(TW_TZ).strftime("%Y%m%d"), "m": "avg_prop", "prop_key": "duration_sec", "prop_type": "event", "i": "1"}
              try:
                  data = amp_get(api_key, secret_key, params)
                  series, labels, result = data.get("data", {}).get("series", []), data.get("data", {}).get("seriesLabels", []), {}
                  for i, label in enumerate(labels):
                      if i < len(series):
                          if isinstance(label, list): label = [x for x in label if isinstance(x, str)][0] if any(isinstance(x, str) for x in label) else ""
                          vals = [v for v in series[i] if v is not None and v > 0]
                          if vals: result[label] = sum(vals) / len(vals)
                  return result
              except: return {}

          def badge(label, message, color): return f"![](https://img.shields.io/badge/{label.replace('-','--').replace(' ','_')}-{message.replace('-','--').replace(' ','_')}-{color})"

          api_key, secret_key = os.environ["AMPLITUDE_API_KEY"], os.environ["AMPLITUDE_QUERY_KEY"]
          all_models = [m for svc in SERVICE_MODELS.values() for m in svc]
          m_counts = query_grouped(api_key, secret_key, "model"); m_avg_dur = query_avg_duration_all(api_key, secret_key)
          daily = query_daily_series(api_key, secret_key, days=14, model_filter=all_models)
          recent = {"total": query_total_calls(api_key, secret_key, model_filter=all_models), "24h": daily[-1], "prev_24h": daily[-2], "7d": sum(daily[-7:]), "prev_7d": sum(daily[-14:-7])}
          
          def get_growth(curr, prev):
              if prev <= 0: return ""
              diff = curr - prev; pct = (diff / max(1, prev)) * 100
              return f"_{'↑' if diff > 0 else '↓' if diff < 0 else '→'}{abs(pct):.1f}%"

          lines = [HEADER, "", f"*Powered by [Amplitude Analytics](https://amplitude.com) · Updated: {datetime.now(TW_TZ).strftime('%Y-%m-%d %H:%M CST')}*", ""]
          lines += [badge("Total_Calls", f"{recent['total']}", "black"), badge("Last_7_Days", f"{recent['7d']}{get_growth(recent['7d'], recent['prev_7d'])}", "blue"), badge("Last_24_Hours", f"{recent['24h']}{get_growth(recent['24h'], recent['prev_24h'])}", "green"), ""]
          
          for svc, models in SERVICE_MODELS.items():
              svc_m = {m: m_counts[m] for m in models if m in m_counts}
              if not svc_m: continue
              lines += [f"### {svc}", "", "| Model | Total Calls | Avg Duration |", "|-------|-------------|--------------|"]
              for m, count in sorted(svc_m.items(), key=lambda x: -x[1]):
                  avg = m_avg_dur.get(m); lines.append(f"| `{m}` | {count} | {f'{avg:.1f}s' if avg else 'N/A'} |")
              svc_apps = query_grouped(api_key, secret_key, "app_name", model_filter=list(models))
              if svc_apps:
                  lines += ["", "#### Top Applications", "", "| Application | Total Calls |", "|-------------|-------------|"]
                  sorted_apps = sorted(svc_apps.items(), key=lambda x: -x[1])
                  for app, count in sorted_apps[:10]: lines.append(f"| {app} | {count} |")
                  lines.append("")
                  for i, (app, count) in enumerate(sorted_apps[:15]): lines.append(badge(app, f"{count}_calls", APP_COLORS[i % len(APP_COLORS)]))
              svgs = SERVICE_SVG.get(svc, [])
              for p in svgs: lines += ["", f"![](./{p})"]
              lines.append("")

          content = README.read_text(encoding="utf-8")
          if HEADER in content:
              start = content.index(HEADER); rest = content[start+len(HEADER):]
              # Look for the next section header (## ) or horizontal rule (---)
              match = re.search(r'\n(## |---)', rest)
              end = start + len(HEADER) + (match.start() if match else len(rest))
              content = content[:start].rstrip() + "\n\n" + "\n".join(lines) + "\n" + content[end:].lstrip()
              README.write_text(content, encoding="utf-8")
          PYEOF

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          [ -d assets ] && git add assets/*.svg 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update request statistics [skip ci]"
            git push
          fi
